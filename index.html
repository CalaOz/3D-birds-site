<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Product Showcase</title>
  </head>
  <body>
    <!-- The 3D scene gets drawn onto this single full-screen canvas -->
    <canvas id="scene"></canvas>

    <!-- Top bar stays fixed on screen the whole time -->
    <header class="topbar">
      <span class="brand">AVIARY</span>
    </header>

    <!-- Scrolling content: each .panel is one full screen. All the text is
         filled in by JavaScript from the active bird, so switching birds
         swaps the whole story. Panels alternate left / right. -->
    <main class="content">
      <!-- Panel 1 — hero (left) -->
      <section class="panel panel--left">
        <div class="panel-inner">
          <p class="eyebrow" id="bird-eyebrow"></p>
          <h1 class="title" id="bird-title"></h1>
          <p class="subtitle" id="bird-subtitle"></p>
        </div>
      </section>

      <!-- Panel 2 — fact 1 (right) -->
      <section class="panel panel--right">
        <div class="panel-inner">
          <p class="eyebrow" id="s0-eyebrow"></p>
          <h2 class="title-sm" id="s0-heading"></h2>
          <p class="subtitle" id="s0-body"></p>
        </div>
      </section>

      <!-- Panel 3 — fact 2 (left) -->
      <section class="panel panel--left">
        <div class="panel-inner">
          <p class="eyebrow" id="s1-eyebrow"></p>
          <h2 class="title-sm" id="s1-heading"></h2>
          <p class="subtitle" id="s1-body"></p>
        </div>
      </section>

      <!-- Panel 4 — fact 3 (right) -->
      <section class="panel panel--right">
        <div class="panel-inner">
          <p class="eyebrow" id="s2-eyebrow"></p>
          <h2 class="title-sm" id="s2-heading"></h2>
          <p class="subtitle" id="s2-body"></p>
        </div>
      </section>
    </main>

    <!-- Bird switcher: fixed bar, always visible. Click to swap models. -->
    <nav class="switcher">
      <button class="switcher-btn is-active" data-index="0">Scarlet Macaw</button>
      <button class="switcher-btn" data-index="1">Toco Toucan</button>
      <button class="switcher-btn" data-index="2">Hyacinth Macaw</button>
    </nav>

    <!-- Loads our JavaScript that builds the 3D world -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
